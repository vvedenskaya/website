<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Hydra Playground</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext x='50%25' y='50%25' text-anchor='middle' dominant-baseline='central' font-size='82'%3E%F0%9F%A6%AB%3C/text%3E%3C/svg%3E" />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body class="home-page">
    <main class="fullscreen">
      <canvas id="hydra-canvas"></canvas>
      <div class="hud hud-sliders" role="application" aria-label="Hydra parameters">
        <div class="hud-slider">
          <label for="hydra-speed">speed</label>
          <input type="range" id="hydra-speed" min="0.02" max="0.5" step="0.01" value="0.1" aria-label="Speed" />
        </div>
        <div class="hud-slider">
          <label for="hydra-scale">scale</label>
          <input type="range" id="hydra-scale" min="0.7" max="1.15" step="0.01" value="0.96" aria-label="Scale" />
        </div>
        <div class="hud-slider">
          <label for="hydra-scroll">scroll</label>
          <input type="range" id="hydra-scroll" min="-0.08" max="0.2" step="0.005" value="0.06" aria-label="Scroll" />
        </div>
        <div class="hud-slider">
          <label for="hydra-kaleid">kaleid</label>
          <input type="range" id="hydra-kaleid" min="10" max="90" step="1" value="45" aria-label="Kaleid" />
        </div>
        <div class="hud-slider">
          <label for="hydra-blend">blend</label>
          <input type="range" id="hydra-blend" min="0.05" max="0.45" step="0.01" value="0.22" aria-label="Blend" />
        </div>
        <div class="hud-slider">
          <label for="hydra-luma">luma</label>
          <input type="range" id="hydra-luma" min="0.05" max="0.35" step="0.01" value="0.18" aria-label="Luma" />
        </div>
        <div class="hud-slider">
          <label for="hydra-saturate">saturate</label>
          <input type="range" id="hydra-saturate" min="1.2" max="3.5" step="0.05" value="2.2" aria-label="Saturate" />
        </div>
      </div>
      <div class="home-pie-menu-wrap">
        <nav class="home-pie-menu coverflow pie-circle" aria-label="Projects">
          <div class="coverflow-track">
        <div id="nyc-widget" class="home-pie-item home-pie-item-1 home-nyc-widget">
          <a href="https://vvedenskaya.github.io/nyc-accessible-places-scraper/" aria-label="Open NYC Accessible Places">
            <video autoplay muted loop playsinline preload="metadata">
              <source src="images/projects/nyc-demo.mp4" type="video/mp4" />
            </video>
            <span>NYC Accessible Places</span>
          </a>
        </div>
        <div id="nasty-widget" class="home-pie-item home-pie-item-2 home-nyc-widget home-nasty-widget">
          <a href="https://nasty-ai-1.onrender.com/" aria-label="Open NASTY AI">
            <video autoplay muted loop playsinline preload="metadata">
              <source src="images/projects/nasty%20rec%202.mp4" type="video/mp4" />
            </video>
            <span>NASTY AI</span>
          </a>
        </div>
        <div id="neocity-widget" class="home-pie-item home-pie-item-3 home-nyc-widget home-neocity-widget">
          <a href="http://beast:8001/" aria-label="Open NEOCITY Network Map" target="_blank" rel="noopener noreferrer">
            <video autoplay muted loop playsinline preload="metadata">
              <source src="images/projects/neocity_rec.mp4" type="video/mp4" />
            </video>
            <span>NEOCITY NETWORK</span>
          </a>
        </div>
        <div id="album-widget-1" class="home-pie-item home-pie-item-4 home-album-widget home-album-widget-1">
          <a href="https://mestnost.bandcamp.com/album/attempts" aria-label="Open Album One">
            <img src="images/projects/Vvvedenskaya_cover.jpg" alt="Vvedenskaya cover" class="home-album-cover" />
            <span class="home-album-title">Attempts</span>
          </a>
        </div>
        <div id="album-widget-2" class="home-pie-item home-pie-item-5 home-album-widget home-album-widget-2">
          <a href="https://padma2.bandcamp.com/album/kartveli" aria-label="Open Album Two">
            <img src="images/projects/kartveli.jpg" alt="Vvedenskaya cover" class="home-album-cover" />
            <span class="home-album-title">Kartveli</span>
            <div class="home-album-placeholder">
              <strong>ALBUM 02</strong>
              <small>placeholder</small>
            </div>
          </a>
        </div>
        <a href="about.html" class="home-pie-center about-btn" aria-label="About">About</a>
          </div>
        </nav>
      </div>

      <div id="project-popup" class="project-popup" role="dialog" aria-modal="true" aria-labelledby="project-popup-title" aria-hidden="true">
        <div class="project-popup-backdrop"></div>
        <div class="project-popup-box">
          <div class="project-popup-header">
            <h2 id="project-popup-title" class="project-popup-title"></h2>
            <a id="project-popup-external" class="project-popup-external" href="#" target="_blank" rel="noopener noreferrer" aria-label="Open in new tab">Open in new tab</a>
            <button type="button" class="project-popup-close" aria-label="Close">×</button>
          </div>
          <iframe id="project-popup-iframe" class="project-popup-iframe" title="Project"></iframe>
        </div>
      </div>
    </main>

    <script src="https://unpkg.com/hydra-synth@1.3.29/dist/hydra-synth.js" onerror="(function(){var s=document.createElement('script');s.src='https://cdn.jsdelivr.net/npm/hydra-synth@1.3.29/dist/hydra-synth.js';document.head.appendChild(s);}())"></script>
    <script src="js/hydra-home.js"></script>
  </body>
</html>
