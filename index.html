<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Hydra Playground</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext x='50%25' y='50%25' text-anchor='middle' dominant-baseline='central' font-size='82'%3E%F0%9F%A6%AB%3C/text%3E%3C/svg%3E" />
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body class="home-page">
    <main class="fullscreen">
      <canvas id="hydra-canvas"></canvas>
      <div class="hud">
        <p class="editor-hint"><span class="editable-badge">editable code</span> Change this code, then press <strong>apply</strong>.</p>
        <textarea id="hydra-code" spellcheck="false" aria-label="Hydra code editor"></textarea>
        <div class="editor-actions">
          <button id="apply-code" type="button">apply</button>
          <span>Cmd/Ctrl + Enter</span>
        </div>
      </div>
      <div id="nyc-widget" class="home-nyc-widget">
        <a href="https://vvedenskaya.github.io/nyc-accessible-places-scraper/" aria-label="Open NYC Accessible Places">
          <video autoplay muted loop playsinline preload="metadata">
            <source src="images/projects/nyc-demo.mp4" type="video/mp4" />
          </video>
          <span>NYC Accessible Places</span>
        </a>
      </div>
      <div id="nasty-widget" class="home-nyc-widget home-nasty-widget">
        <a href="https://nasty-ai-1.onrender.com/" aria-label="Open NASTY AI">
          <video autoplay muted loop playsinline preload="metadata">
            <source src="images/projects/nasty%20rec%202.mp4" type="video/mp4" />
          </video>
          <span>NASTY AI</span>
        </a>
      </div>
      <div id="neocity-widget" class="home-nyc-widget home-neocity-widget">
        <a href="http://beast:8001/" aria-label="Open NEOCITY Network Map" target="_blank" rel="noopener noreferrer">
          <video autoplay muted loop playsinline preload="metadata">
            <source src="images/projects/neocity_rec.mp4" type="video/mp4" />
          </video>
          <span>NEOCITY NETWORK</span>
        </a>
      </div>
      <div id="album-widget-1" class="home-album-widget home-album-widget-1">
        <a href="https://mestnost.bandcamp.com/album/attempts" aria-label="Open Album One">
          <img src="images/projects/Vvvedenskaya_cover.jpg" alt="Vvedenskaya cover" class="home-album-cover" />
          <span class="home-album-title">Attempts</span>
        </a>
      </div>
      <div id="album-widget-2" class="home-album-widget home-album-widget-2">
        <a href="https://padma2.bandcamp.com/album/kartveli" aria-label="Open Album Two">
          <img src="images/projects/kartveli.jpg" alt="Vvedenskaya cover" class="home-album-cover" />
          <span class="home-album-title">Kartveli</span>
          <div class="home-album-placeholder">
            <strong>ALBUM 02</strong>
            <small>placeholder</small>
          </div>
        </a>
      </div>
    </main>

    <script src="https://unpkg.com/hydra-synth@1.3.29/dist/hydra-synth.js" onerror="(function(){var s=document.createElement('script');s.src='https://cdn.jsdelivr.net/npm/hydra-synth@1.3.29/dist/hydra-synth.js';document.head.appendChild(s);}())"></script>
    <script src="js/hydra-home.js"></script>
  </body>
</html>
